const announceList = document.getElementById('announceList');
const announcePages = document.getElementById('announcePages');
const ITEMS_PER_PAGE = 6;
let currentAnnouncePage = 0;

function renderAnnouncePage(page) {
    let start = page * ITEMS_PER_PAGE;
    let end = start + ITEMS_PER_PAGE;
    let pageItems = UPDATE_LOG.slice(start, end);
    announceList.innerHTML = '';
    pageItems.forEach(log => {
        let li = document.createElement('li');
        li.innerHTML = `<strong>${log.version}</strong> (${log.date})<br>${log.notes.join('<br>')}`;
        announceList.appendChild(li);
    });
    let totalPages = Math.ceil(UPDATE_LOG.length / ITEMS_PER_PAGE);
    announcePages.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
        let btn = document.createElement('button');
        btn.textContent = i + 1;
        btn.disabled = (i === page);
        btn.onclick = () => {
            currentAnnouncePage = i;
            renderAnnouncePage(i);
        };
        announcePages.appendChild(btn);
    }
}

function openNatureMenu() {
    let overlay = document.createElement('div');
    overlay.className = 'nature-menu-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) document.body.removeChild(overlay); };

    let menu = document.createElement('div');
    menu.className = 'nature-menu';

    const groups = [
        { title: '没有性格带来的影响', natures: ['坦率','勤奋','害羞','浮躁','认真'] },
        { title: '帮忙速度', natures: ['怕寂寞','勇敢','顽皮','固执'] },
        { title: '食材概率', natures: ['慢吞吞','冷静','内敛','马虎'] },
        { title: '技能概率', natures: ['自大','慎重','温顺','温和'] },
        { title: 'EXP获得量', natures: ['天真','急躁','爽朗','胆小'] },
        { title: '活力回复量', natures: ['乐天','悠闲','淘气','大胆'] }
    ];

    groups.forEach(group => {
        let div = document.createElement('div');
        div.className = 'nature-group';
        div.innerHTML = `<div class="nature-group-title">${group.title}</div>`;
        let grid = document.createElement('div');
        grid.className = 'nature-grid';
        group.natures.forEach(nat => {
            let btn = document.createElement('button');
            btn.className = 'nature-btn';
            btn.textContent = nat;
            btn.onclick = () => {
                natureSelect.value = nat;
                updateNatureDisplay();
                document.body.removeChild(overlay);
            };
            grid.appendChild(btn);
        });
        div.appendChild(grid);
        menu.appendChild(div);
    });

    let footer = document.createElement('div');
    footer.className = 'nature-menu-footer';
    let closeBtn = document.createElement('button');
    closeBtn.textContent = '关闭';
    closeBtn.className = 'skill-close-btn';
    closeBtn.onclick = () => document.body.removeChild(overlay);
    footer.appendChild(closeBtn);
    menu.appendChild(footer);

    overlay.appendChild(menu);
    document.body.appendChild(overlay);
}

function getNatureEffect(nature) {
    const effects = {
        '怕寂寞': { pos: '帮忙速度', neg: '活力回复量' },
        '勇敢': { pos: '帮忙速度', neg: 'EXP获得量' },
        '顽皮': { pos: '帮忙速度', neg: '技能概率' },
        '固执': { pos: '帮忙速度', neg: '食材概率' },
        '慢吞吞': { pos: '食材概率', neg: '活力回复量' },
        '冷静': { pos: '食材概率', neg: 'EXP获得量' },
        '内敛': { pos: '食材概率', neg: '帮忙速度' },
        '马虎': { pos: '食材概率', neg: '技能概率' },
        '自大': { pos: '技能概率', neg: 'EXP获得量' },
        '慎重': { pos: '技能概率', neg: '食材概率' },
        '温顺': { pos: '技能概率', neg: '活力回复量' },
        '温和': { pos: '技能概率', neg: '帮忙速度' },
        '天真': { pos: 'EXP获得量', neg: '食材概率' },
        '急躁': { pos: 'EXP获得量', neg: '活力回复量' },
        '爽朗': { pos: 'EXP获得量', neg: '技能概率' },
        '胆小': { pos: 'EXP获得量', neg: '帮忙速度' },
        '乐天': { pos: '活力回复量', neg: '食材概率' },
        '悠闲': { pos: '活力回复量', neg: 'EXP获得量' },
        '淘气': { pos: '活力回复量', neg: '技能概率' },
        '大胆': { pos: '活力回复量', neg: '帮忙速度' },
    };
    if (effects[nature]) {
        return `<span style="color:#27ae60;">▲</span>${effects[nature].pos} <span style="color:#e74c3c;">▼</span>${effects[nature].neg}`;
    }
    return '无增减';
}

    } else if (currentType === '食材型') {

    }

    updateRealisticVisibility();

// ========== 历史记录与保存 ==========
function toggleRealistic() {
    useRealistic = !useRealistic;
    window.useRealistic = useRealistic;
    if (useRealistic) {
        realisticBtn.classList.add('active');
    } else {
        realisticBtn.classList.remove('active');
    }
}

function removeSaveButton() {
    let oldBtn = document.getElementById('saveResultBtn');
    if (oldBtn) oldBtn.remove();
}

function addSaveButton() {
    removeSaveButton();
    let btn = document.createElement('button');
    btn.id = 'saveResultBtn';
    btn.className = 'save-btn';
    btn.textContent = '💾 保存此结果';
    btn.onclick = function() {
        let content = resultBox.innerHTML;
        if (!content.trim()) return;
        let typeLabel = typeSelect.value;
        let poke = '';
        if (['能量填充M', '树果遽增', '传说宝可梦', '幻兽'].includes(typeLabel) || (typeLabel === '食材型' && pokeSelect.value !== '__other__') || (typeLabel === '技能型' && pokeSelect.value !== '__other__')) {
            poke = pokeSelect.options[pokeSelect.selectedIndex].text + ' ';
        }
        let subs = getSelectedSubs().join(',') || '无';
        let nature = natureSelect.value;
        let summary = `${typeLabel} ${poke}| ${subs} | ${nature}`;
        let matchTheory = content.match(/<span[^>]*color:#2980b9[^>]*>([^<]+)<\/span>/);
        let matchReal = content.match(/<span[^>]*color:#27ae60[^>]*>([^<]+)<\/span>/);
        if (matchTheory) summary += ` | 理论: ${matchTheory[1]}`;
        if (matchReal) summary += ` | 实战: ${matchReal[1]}`;
        savedHistory.unshift({ summary: summary, content: content });
        if (savedHistory.length > 10) savedHistory.pop();
        renderHistory();
        alert('结果已保存到下方历史记录！');
    };
    resultBox.appendChild(btn);
}

function renderHistory() {
    historyList.innerHTML = '';
    savedHistory.forEach((item, index) => {
        let div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span>${item.summary}</span>`;
        let delBtn = document.createElement('button');
        delBtn.className = 'delete-history';
        delBtn.textContent = '❌';
        delBtn.onclick = function(e) {
            e.stopPropagation();
            savedHistory.splice(index, 1);
            renderHistory();
        };
        div.appendChild(delBtn);
        div.onclick = function() {
            resultBox.innerHTML = item.content;
            addSaveButton();
        };
        historyList.appendChild(div);
    });
}

function clearHistory() {
    if (confirm('确定要清空所有已保存的结果吗？')) {
        savedHistory = [];
        renderHistory();
    }
}

// ========== 效率计算调用包装 ==========

calculate = function() {
    originalCalculate();
    addSaveButton();
};
