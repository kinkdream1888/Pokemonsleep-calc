    </div>
    <div class="note">※ 宝可梦默认等级：70级（效率比与等级无关）</div>

    <div class="row">

            <option value="树果型">树果型</option>
            <option value="食材型">食材型</option>
            <option value="技能型">技能型</option>
            <option value="能量填充M">能量填充M</option>
            <option value="树果遽增">树果遽增</option>
            <option value="传说宝可梦">传说宝可梦</option>
            <option value="幻兽">全能型（幻兽）</option>
        </select>
    </div>

    <div class="row" id="pokeRow" style="display:none;">
        <label>选择宝可梦:</label>
        <select id="pokeSelect"></select>
        <span id="skillTag" class="skill-tag" style="display:none;"></span>
    </div>

    <div class="note" id="subNote">※ 树果S为可选副技能，最多选4个</div>

    <div class="row"><label>副技能:</label></div>
    <div class="sub-skills" id="subCheckboxes"></div>

    <div class="row">
        <label>选择性格:</label>
        <select id="natureSelect"></select>
    </div>

    <div class="checkbox-row" id="realisticRow">
        <input type="checkbox" id="realisticModeCheckbox">
        <label for="realisticModeCheckbox">实战估算（考虑技能打折）</label>
    </div>

    <button class="btn" onclick="calculate()">计算效率</button>

    <div class="result" id="resultBox"></div>

    <!-- 捕捉概率区域 -->
    <div class="prob-options">
        <button class="prob-btn" onclick="calculateProbability()">🎲 计算捕捉概率</button>
        <select id="lockGold" style="width: 90px;">
            <option value="0">锁0金</option>
            <option value="1">锁1金</option>
            <option value="2">锁2金</option>
            <option value="3">锁3金</option>
        </select>
        <select id="simLevel" style="width: 120px;">
            <option value="4">70级(前4格)</option>
            <option value="3">50级(前3格)</option>
        </select>

        <span id="natureCount" style="font-size: 0.8em; color: gray;"></span>
    </div>
    <div class="prob-result" id="probResult"></div>

    <div class="history-panel" id="historyPanel">
        <b>📋 已保存的结果对比</b>
        <div id="historyList"></div>
        <button class="clear-history-btn" onclick="clearHistory()">清空历史</button>
    </div>
</div>

<!-- 性格多选面板 -->

            <button onclick="closeNaturePanel()" style="font-size:0.8em;">确认</button>
        </div>
    </div>
</div>

    { version: 'V0.0.1', date: '2026-04-03', notes: [
        '确立基础效率公式：最终效率 = 基础 × 副技能倍率 × 性格倍率。',
        '完成树果型、食材型、技能型词条倍率定义（如帮M=1.1628）。'
    ]},
];

const announceList = document.getElementById('announceList');
const announcePages = document.getElementById('announcePages');
const ITEMS_PER_PAGE = 6;
let currentAnnouncePage = 0;

function renderAnnouncePage(page) {
    let start = page * ITEMS_PER_PAGE;
    let end = start + ITEMS_PER_PAGE;
    let pageItems = UPDATE_LOG.slice(start, end);
    announceList.innerHTML = '';
    pageItems.forEach(log => {
        let li = document.createElement('li');
        li.innerHTML = `<strong>${log.version}</strong> (${log.date})<br>${log.notes.join('<br>')}`;
        announceList.appendChild(li);
    });
    let totalPages = Math.ceil(UPDATE_LOG.length / ITEMS_PER_PAGE);
    announcePages.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
        let btn = document.createElement('button');
        btn.textContent = i + 1;
        btn.disabled = (i === page);
        btn.onclick = () => {
            currentAnnouncePage = i;
            renderAnnouncePage(i);
        };
        announcePages.appendChild(btn);
    }
}

function toggleAnnounce() {
    const panel = document.getElementById('announcePanel');
    if (panel.style.display === 'block') {
        panel.style.display = 'none';
    } else {
        panel.style.display = 'block';
        currentAnnouncePage = 0;
        renderAnnouncePage(0);
    }
}

// ========== 界面逻辑 ==========
const typeSelect = document.getElementById('typeSelect');
const pokeRow = document.getElementById('pokeRow');
const pokeSelect = document.getElementById('pokeSelect');
const skillTag = document.getElementById('skillTag');
const subNote = document.getElementById('subNote');
const subCheckboxes = document.getElementById('subCheckboxes');
const natureSelect = document.getElementById('natureSelect');
const resultBox = document.getElementById('resultBox');
const realisticCheckbox = document.getElementById('realisticModeCheckbox');
const realisticRow = document.getElementById('realisticRow');
const historyList = document.getElementById('historyList');
const natureCountSpan = document.getElementById('natureCount');

let maxSubs = 4;
let currentType = '树果型';
let savedHistory = [];
let selectedNatures = [];

for (let nature of Object.keys(NATURES)) {

    opt.textContent = nature;

}

function renderSubCheckboxes(showBerryS) {
    subCheckboxes.innerHTML = '';
    for (let name in SUB_SKILLS) {
        if (name === '树果S' && !showBerryS) continue;
        let label = document.createElement('label');
        let cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = name;
        cb.id = 'sub_' + name;
        cb.addEventListener('change', onSubChange);
        label.appendChild(cb);
        label.appendChild(document.createTextNode(name));
        subCheckboxes.appendChild(label);
    }
}

function updateRealisticVisibility() {
    let calcType = typeSelect.value;
    let show = false;
    if (['技能型', '能量填充M', '树果遽增', '传说宝可梦', '幻兽'].includes(calcType)) {
        show = true;
    } else if (calcType === '食材型') {
        let poke = pokeSelect.value;
        if (poke && HYBRID_FOOD_MONS_DATA[poke]) {
            show = true;
        }
    }
    if (show) {
        realisticRow.style.display = 'flex';
    } else {
        realisticRow.style.display = 'none';
        realisticCheckbox.checked = false;
    }
}

function updateSkillTag() {
    let calcType = typeSelect.value;
    let pokeValue = pokeSelect.value;
    skillTag.style.display = 'none';
    if (calcType === '食材型' && pokeValue && HYBRID_FOOD_MONS_DATA[pokeValue] && HYBRID_FOOD_MONS_DATA[pokeValue].skillLabel) {
        skillTag.textContent = HYBRID_FOOD_MONS_DATA[pokeValue].skillLabel;
        skillTag.style.display = 'inline-block';
    } else if (calcType === '传说宝可梦' && pokeValue && LEGENDARY_MONS_DATA[pokeValue] && LEGENDARY_MONS_DATA[pokeValue].skillLabel) {
        skillTag.textContent = LEGENDARY_MONS_DATA[pokeValue].skillLabel;
        skillTag.style.display = 'inline-block';
    } else if (calcType === '幻兽' && pokeValue && PHANTOM_MONS_DATA[pokeValue] && PHANTOM_MONS_DATA[pokeValue].skillLabel) {
        skillTag.textContent = PHANTOM_MONS_DATA[pokeValue].skillLabel;
        skillTag.style.display = 'inline-block';
    } else if (calcType === '技能型' && pokeValue && SPECIAL_SKILL_MONS_DATA[pokeValue] && SPECIAL_SKILL_MONS_DATA[pokeValue].skillLabel) {
        skillTag.textContent = SPECIAL_SKILL_MONS_DATA[pokeValue].skillLabel;

}

        }

        }

    } else if (currentType === '传说宝可梦') {

    } else if (currentType === '幻兽') {

    } else if (currentType === '技能型') {

        optDefault.textContent = '功能型';

        for (let mon of Object.keys(SPECIAL_SKILL_MONS_DATA)) {

    } else if (currentType === '食材型') {
        subNote.textContent = '※ 不附带树果S，最多选4个副技能。料理成功S、食材精选S宝可梦可与专家对比。';

pokeSelect.addEventListener('change', () => {

});

function onSubChange() { enforceSubLimit(); }

function enforceSubLimit() {
    let checked = getSelectedSubs();
    if (checked.length > maxSubs) {
        let last = checked[checked.length-1];
        document.getElementById('sub_' + last).checked = false;
        alert(`当前类型最多选择${maxSubs}个副技能！`);
    }
}

function getSelectedSubs() {
    let subs = [];
    let checkboxes = subCheckboxes.querySelectorAll('input[type="checkbox"]:checked');
    checkboxes.forEach(cb => subs.push(cb.value));
    return subs;
}

typeSelect.addEventListener('change', onTypeChange);
renderSubCheckboxes(true);
onTypeChange();

// ========== 性格多选面板 ==========
function buildNaturePanel() {
    const grid = document.getElementById('natureGrid');
    grid.innerHTML = '';
    for (let nature of Object.keys(NATURES)) {
        let label = document.createElement('label');
        let cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = nature;
        cb.checked = selectedNatures.includes(nature);
        cb.addEventListener('change', () => {
            if (cb.checked) {
                if (!selectedNatures.includes(nature)) selectedNatures.push(nature);
            } else {
                selectedNatures = selectedNatures.filter(n => n !== nature);
            }
            updateNatureCount();
        });
        label.appendChild(cb);
        label.appendChild(document.createTextNode(nature));
        grid.appendChild(label);
    }
}
function openNaturePanel() {
    document.getElementById('natureOverlay').style.display = 'flex';
    buildNaturePanel();
}
function closeNaturePanel() {
    document.getElementById('natureOverlay').style.display = 'none';
    updateNatureCount();
}
function selectAllNatures() {
    selectedNatures = Object.keys(NATURES);
    buildNaturePanel();
    updateNatureCount();
}
function deselectAllNatures() {
    selectedNatures = [];
    buildNaturePanel();
    updateNatureCount();
}
function updateNatureCount() {
    if (selectedNatures.length === 0) {
        natureCountSpan.textContent = '（使用主性格）';
    } else {
        natureCountSpan.textContent = `已选 ${selectedNatures.length}/25`;
    }
}

// 捕捉概率计算（V0.1.7.3）
function calculateProbability() {
    let selectedSubs = getSelectedSubs();
    let natureProb = 0;
    if (selectedNatures.length > 0) {
        natureProb = selectedNatures.length / 25;
    } else {
        natureProb = 1/25;
    }
    let lockGold = parseInt(document.getElementById('lockGold').value);
    let simSlots = parseInt(document.getElementById('simLevel').value);
    let calcType = typeSelect.value;
    let pokeValue = pokeSelect ? pokeSelect.value : null;

    // 幻兽拦截
    if (calcType === '幻兽') {
        document.getElementById('probResult').innerHTML = '※ 幻兽副技能需使用灵感种子刷新，因此暂时无法计算';
        document.getElementById('probResult').style.display = 'block';
        return;
    }

    const GOLD_SKILLS = ["树果S", "帮手奖励", "睡眠EXP奖励", "研究EXP奖励", "活力回复奖励", "梦之碎片奖励", "技能等级M"];
    const BLUE_SKILLS = ["技能等级S", "技概M", "帮M", "食概M", "持有上限L", "持有上限M"];
    const WHITE_SKILLS = ["技概S", "帮S", "食概S", "持有上限S"];

    const WEIGHTS = {};
    GOLD_SKILLS.forEach(s => WEIGHTS[s] = 0.02);
    BLUE_SKILLS.forEach(s => WEIGHTS[s] = 0.055);
    WHITE_SKILLS.forEach(s => WEIGHTS[s] = 0.1325);

    for (let sub of selectedSubs) {
        if (!(sub in WEIGHTS)) { alert(`未知副技能: ${sub}`); return; }
    }

    const targetSkills = selectedSubs.filter(s => s in WEIGHTS);
    if (targetSkills.length > simSlots) {
        document.getElementById('probResult').innerHTML = `<b>错误：</b>目标技能数超过可用格数（${simSlots}格），无法出现。`;
        document.getElementById('probResult').style.display = 'block';
        return;
    }

    const TOTAL_SKILLS = [...GOLD_SKILLS, ...BLUE_SKILLS, ...WHITE_SKILLS];
    let successCount = 0;
    const SIM_COUNT = 1000000;

    for (let i = 0; i < SIM_COUNT; i++) {
        let pool = [...TOTAL_SKILLS];
        let chosen = [];

        for (let g = 0; g < Math.min(lockGold, simSlots); g++) {
            let goldPool = GOLD_SKILLS.filter(s => pool.includes(s));
            if (goldPool.length === 0) break;
            let pick = goldPool[Math.floor(Math.random() * goldPool.length)];
            chosen.push(pick);
            pool.splice(pool.indexOf(pick), 1);
        }

        let remainingSlots = simSlots - chosen.length;
        for (let s = 0; s < remainingSlots; s++) {
            let poolWeight = pool.reduce((sum, skill) => sum + WEIGHTS[skill], 0);
            let rand = Math.random() * poolWeight;
            let cumulative = 0;
            let pickedSkill = pool[pool.length - 1];
            for (let skill of pool) {
                cumulative += WEIGHTS[skill];
                if (rand <= cumulative) { pickedSkill = skill; break; }
            }
            chosen.push(pickedSkill);
            pool.splice(pool.indexOf(pickedSkill), 1);
        }

        let foundAll = true;
        for (let ts of targetSkills) {
            if (!chosen.includes(ts)) { foundAll = false; break; }
        }
        if (foundAll) successCount++;
    }

    let prob = (successCount / SIM_COUNT) * 100 * natureProb;
    let foodNote = '';
    if (calcType === '食材型' || (calcType === '技能型' && pokeValue && SPECIAL_SKILL_MONS_DATA[pokeValue])) {
        prob *= (1/9);
        foodNote = '\n※ 已计入食材组合 AAA 的概率 (1/9)。';
    }
    let oneOver = Math.round(1 / (prob / 100));
    let natureDesc = selectedNatures.length > 0 ? `${selectedNatures.length}个性格` : natureSelect.value;
    let resultText = `【捕捉概率估算】
副技能: ${selectedSubs.join(', ')}
性格条件: ${natureDesc} (概率 ${natureProb.toFixed(4)})
模拟等级: ${simSlots === 3 ? '50级（前3格）' : '70级（前4格）'}
锁金数: ${lockGold}
近似概率: ${prob.toFixed(6)}% (约 1/${oneOver})
${foodNote}
${selectedSubs.some(s => s.endsWith('S')) ? '※ 若出现S级技能，可使用银瓜子升级至M。' : ''}
※ 基于100万次模拟，前${simSlots}格无放回抽取。`;

    document.getElementById('probResult').innerHTML = resultText.replace(/\n/g, '<br>');
    document.getElementById('probResult').style.display = 'block';
  }

// ========== 历史记录与保存 ==========
function removeSaveButton() {
    let oldBtn = document.getElementById('saveResultBtn');
    if (oldBtn) oldBtn.remove();
}

function addSaveButton() {
    removeSaveButton();
    let btn = document.createElement('button');
    btn.id = 'saveResultBtn';
    btn.className = 'save-btn';
    btn.textContent = '💾 保存此结果';
    btn.onclick = function() {
        let content = resultBox.innerHTML;
        if (!content.trim()) return;
        let typeLabel = typeSelect.value;
        let poke = '';
        if (['能量填充M', '树果遽增', '传说宝可梦', '幻兽'].includes(typeLabel) || (typeLabel === '食材型' && pokeSelect.value !== '__other__') || (typeLabel === '技能型' && pokeSelect.value !== '__other__')) {
            poke = pokeSelect.options[pokeSelect.selectedIndex].text + ' ';
        }
        let subs = getSelectedSubs().join(',') || '无';
        let nature = natureSelect.value;
        let summary = `${typeLabel} ${poke}| ${subs} | ${nature}`;
        let matchTheory = content.match(/<span[^>]*color:#2980b9[^>]*>([^<]+)<\/span>/);
        let matchReal = content.match(/<span[^>]*color:#27ae60[^>]*>([^<]+)<\/span>/);
        if (matchTheory) summary += ` | 理论: ${matchTheory[1]}`;
        if (matchReal) summary += ` | 实战: ${matchReal[1]}`;
        savedHistory.unshift({ summary: summary, content: content });
        if (savedHistory.length > 10) savedHistory.pop();
        renderHistory();
        alert('结果已保存到下方历史记录！');
    };
    resultBox.appendChild(btn);
}

function renderHistory() {
    historyList.innerHTML = '';
    savedHistory.forEach((item, index) => {
        let div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span>${item.summary}</span>`;
        let delBtn = document.createElement('button');
        delBtn.className = 'delete-history';
        delBtn.textContent = '❌';
        delBtn.onclick = function(e) {
            e.stopPropagation();
            savedHistory.splice(index, 1);
            renderHistory();
        };
        div.appendChild(delBtn);
        div.onclick = function() {
            resultBox.innerHTML = item.content;
            addSaveButton();
        };
        historyList.appendChild(div);
    });
}

function clearHistory() {
    if (confirm('确定要清空所有已保存的结果吗？')) {
        savedHistory = [];
        renderHistory();
    }
}

const originalCalculate = calculate;
calculate = function() {
    originalCalculate();
    addSaveButton();
};
